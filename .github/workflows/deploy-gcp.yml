name: Deploy to GCP

on:
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'apps/runner/**'
      - 'packages/**'

concurrency:
  group: deploy-gcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.changes.outputs.api }}
      runner: ${{ steps.changes.outputs.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
            runner:
              - 'apps/runner/**'

  deploy-api:
    name: Deploy API
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet

      - name: Build and deploy API
        run: |
          gcloud builds submit \
            --config=apps/api/cloudbuild.yaml \
            --project=common-os-prod \
            --substitutions="SHORT_SHA=${GITHUB_SHA::7}" \
            .

  deploy-runner:
    name: Deploy Runner
    needs: detect-changes
    if: needs.detect-changes.outputs.runner == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and deploy Runner
        run: |
          gcloud builds submit \
            --config=apps/runner/cloudbuild.yaml \
            --project=common-os-prod \
            --substitutions="SHORT_SHA=${GITHUB_SHA::7}" \
            .
